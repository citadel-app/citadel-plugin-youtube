name: Release Plugin

on:
  push:
    branches: ["main"]

jobs:
  build_and_release:
    name: Build and Release Plugin
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed for creating GitHub Releases
      packages: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install Dependencies
        run: npm install --legacy-peer-deps
        env:
          CITADEL_RELEASE_TOKEN: ${{ secrets.CITADEL_RELEASE_TOKEN}}

      - name: Build Plugin
        run: npm run build

      - name: Get Version
        id: get_version
        run: echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Package Plugin (ZIP)
        run: |
          # Create a staging directory to zip cleanly
          mkdir -p .release-bundle

          # Copy the bundled assets
          cp -r dist .release-bundle/
          cp package.json .release-bundle/

          # Optional: Copy branding/assets if they exist
          if [ -d "assets" ]; then
            cp -r assets .release-bundle/
          fi

          # Zip the contents of the staging directory
          cd .release-bundle
          zip -r ../citadel-plugin-youtube.zip ./*
          cd ..

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.VERSION }}
          name: Release v${{ steps.get_version.outputs.VERSION }}
          files: |
            citadel-plugin-youtube.zip
            package.json
          generate_release_notes: true
          draft: false
          prerelease: false
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.CITADEL_RELEASE_TOKEN }}

      - name: Notify Marketplace
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.CITADEL_RELEASE_TOKEN }}" \
            https://api.github.com/repos/citadel-app/citadel-marketplace/dispatches \
            -d "{\"event_type\": \"new-plugin-release\", \"client_payload\": { \"plugin_id\": \"youtube\", \"version\": \"${{ steps.get_version.outputs.VERSION }}\", \"bundle_url\": \"https://github.com/citadel-app/citadel-plugin-youtube/releases/download/v${{ steps.get_version.outputs.VERSION }}/citadel-plugin-youtube.zip\", \"changelog\": \"Automated release from CI\" } }"
